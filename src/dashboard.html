<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reporte de campañas</title>
<style>
  :root{--bg:#0e1116;--surface:#171b22;--surface-2:#1d2229;--border:#262d38;--ink:#e8ecf2;--muted:#8a93a2;--faint:#5c6572;--pos:#3fb950;--neg:#f85149;--accent:#5b8cff;--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;--sans:"Inter",system-ui,-apple-system,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;padding:clamp(20px,4vw,48px);line-height:1.4}
  .wrap{max-width:1120px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-bottom:18px;border-bottom:1px solid var(--border)}
  header h1{font-size:clamp(22px,3vw,30px);font-weight:600;letter-spacing:-.02em}
  .stamp{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right}
  .stamp .dot{color:var(--pos)}
  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:16px 0 2px}
  .bar .lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-right:2px}
  .pill{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:7px;padding:7px 13px;font-family:var(--mono);font-size:12px;cursor:pointer}
  .pill:hover{color:var(--ink);border-color:var(--faint)}
  .pill.on{background:var(--surface-2);color:var(--ink);border-color:var(--accent)}
  .eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--faint);margin:32px 0 12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .metric{background:var(--surface);padding:16px 18px}
  .metric .label{font-size:12px;color:var(--muted);margin-bottom:9px}
  .metric .value{font-family:var(--mono);font-size:clamp(17px,1.9vw,23px);font-weight:500;letter-spacing:-.02em;white-space:nowrap}
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:4px}
  thead th{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-weight:500;text-align:right;padding:10px 12px;border-bottom:1px solid var(--border)}
  thead th:first-child{text-align:left}
  tbody td{padding:12px 12px;text-align:right;font-family:var(--mono);border-bottom:1px solid var(--surface-2)}
  tbody td:first-child{text-align:left;font-family:var(--sans)}
  tbody tr:hover td{background:var(--surface)}
  .good{color:var(--pos)}.mid{color:var(--ink)}.low{color:var(--neg)}
  .chart{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
  .creatives{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .cre{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
  .cre .nm{font-size:13px;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cre .row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:5px}
  .cre .row b{color:var(--ink);font-weight:500}
  .empty{color:var(--muted);padding:36px 0;font-size:15px}
  footer{margin-top:44px;font-size:12px;color:var(--faint);font-family:var(--mono)}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="empty">Cargando…</div></div>
<script>
const money=(n)=>"$"+(Math.round(n)||0).toLocaleString("es-AR");
const dec=(n,d=2)=>(n||0).toFixed(d);
const num=(n)=>(Math.round(n)||0).toLocaleString("es-AR");
const roasCls=(r)=>r>=3?"good":r>=1.5?"mid":"low";
const cap=(s)=>s.charAt(0).toUpperCase()+s.slice(1);

const slug=location.pathname.split("/").pop().replace(".html","")||"index";
let DATA=null, view="mes", account="Todas";

function fmtStamp(iso){const d=new Date(iso);return d.toLocaleString("es-AR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});}

function lineChart(series){
  if(!series.length) return '<div class="empty">Sin datos en el rango.</div>';
  const W=1040,H=220,pad=34;
  const max=Math.max(...series.map(d=>d.roas),1)*1.15;
  const x=(i)=>pad+(i*(W-pad*2))/Math.max(series.length-1,1);
  const y=(v)=>H-pad-(v/max)*(H-pad*2);
  const pts=series.map((d,i)=>`${x(i)},${y(d.roas)}`).join(" ");
  const dots=series.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d.roas)}" r="2.5" fill="#5b8cff"/>`).join("");
  const gy=[0,max/2,max].map(v=>`<line x1="${pad}" x2="${W-pad}" y1="${y(v)}" y2="${y(v)}" stroke="#262d38"/><text x="${pad-6}" y="${y(v)+4}" fill="#5c6572" font-size="11" text-anchor="end" font-family="monospace">${v.toFixed(1)}</text>`).join("");
  const step=Math.ceil(series.length/12||1);
  const lbl=series.map((d,i)=>i%step===0?`<text x="${x(i)}" y="${H-12}" fill="#5c6572" font-size="10" text-anchor="middle" font-family="monospace">${d.date.slice(8)}</text>`:"").join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${gy}<polyline points="${pts}" fill="none" stroke="#5b8cff" stroke-width="2"/>${dots}${lbl}</svg>`;
}

function bar(label,current,options,setter){
  return `<div class="bar"><span class="lbl">${label}</span>`+
    options.map(o=>`<span class="pill ${current===o.key?"on":""}" onclick="${setter}('${o.key}')">${o.label}</span>`).join("")+`</div>`;
}

function render(){
  const v=DATA.views[view];
  const r=v[account];
  const t=r.totals;
  const rows=r.campaigns.map(c=>`<tr><td>${c.name}</td><td>${money(c.spend)}</td><td>${num(c.purchases)}</td><td class="${roasCls(c.roas)}">${dec(c.roas)}</td><td>${money(c.revenue)}</td><td>${c.purchases>0?money(c.costPerPurchase):"—"}</td></tr>`).join("");
  const cre=r.creatives.length?r.creatives.map(c=>`<div class="cre"><div class="nm">${c.name}</div><div class="row"><span>ROAS</span><b class="${roasCls(c.roas)}">${dec(c.roas)}x</b></div><div class="row"><span>Inversión</span><b>${money(c.spend)}</b></div><div class="row"><span>Compras</span><b>${num(c.purchases)}</b></div></div>`).join(""):'<div class="empty">Sin creativos con inversión en el rango.</div>';

  const viewOpts=Object.keys(DATA.views).map(k=>({key:k,label:DATA.views[k]._label}));
  const acctOpts=[{key:"Todas",label:"Todas"},...DATA.accounts.map(a=>({key:a,label:a}))];

  document.getElementById("app").innerHTML=`
    <header><h1>${DATA.client} · Meta Ads</h1>
      <div class="stamp"><span class="dot">●</span> ${v._from} → ${v._to} · act. ${fmtStamp(DATA.updatedAt)}</div></header>
    ${DATA.accounts.length>1?bar("Cuenta",account,acctOpts,"setAccount"):""}
    ${bar("Período",view,viewOpts,"setView")}
    <p class="eyebrow">Resumen</p>
    <div class="grid">
      <div class="metric"><div class="label">ROAS</div><div class="value ${roasCls(t.roas)}">${dec(t.roas)}</div></div>
      <div class="metric"><div class="label">Inversión</div><div class="value">${money(t.spend)}</div></div>
      <div class="metric"><div class="label">Valor de compras</div><div class="value">${money(t.revenue)}</div></div>
      <div class="metric"><div class="label">Compras</div><div class="value">${num(t.purchases)}</div></div>
      <div class="metric"><div class="label">Costo por compra</div><div class="value">${money(t.costPerPurchase)}</div></div>
      <div class="metric"><div class="label">Ticket promedio</div><div class="value">${money(t.aov)}</div></div>
      <div class="metric"><div class="label">CTR</div><div class="value">${dec(t.ctr,1)}%</div></div>
      <div class="metric"><div class="label">CPC</div><div class="value">${money(t.cpc)}</div></div>
    </div>
    <p class="eyebrow">Por campaña</p>
    <table><thead><tr><th>Campaña</th><th>Inversión</th><th>Compras</th><th>ROAS</th><th>Valor</th><th>Costo/compra</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" style="color:var(--muted)">Sin campañas en el rango.</td></tr>'}</tbody></table>
    <p class="eyebrow">ROAS por día</p>
    <div class="chart">${lineChart(r.roasByDay)}</div>
    <p class="eyebrow">Best creatives</p>
    <div class="creatives">${cre}</div>
    <footer>Zimba Digital · datos de Meta Ads, se actualiza 3 veces al día</footer>`;
}

function setView(k){view=k;render();}
function setAccount(k){account=k;render();}

fetch(`./data/${slug}.json`)
  .then(r=>{if(!r.ok)throw new Error();return r.json();})
  .then(d=>{DATA=d;view=d.defaultView||Object.keys(d.views)[0];render();})
  .catch(()=>{document.getElementById("app").innerHTML='<div class="empty">Este reporte todavía no tiene datos.</div>';});
</script>
</body>
</html>
